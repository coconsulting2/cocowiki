<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 780" width="680" height="780" role="img">
<title>Flujo de pantallas del rol Solicitante</title>
<desc>Navegación desde login hasta las pantallas del empleado viajero</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .t { font-size: 14px; fill: #1a1a1a; font-weight: 400; }
  .ts { font-size: 12px; fill: #5F5E5A; font-weight: 400; }
  .th { font-size: 14px; fill: #1a1a1a; font-weight: 500; }
  .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
  .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 2 2; }
  .box { fill: #F5F4F0; stroke: rgba(0,0,0,0.15); }
  .c-gray > rect, .c-gray > circle, .c-gray > ellipse, .c-gray > polygon { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray > text.th, .c-gray > text.t { fill: #444441; }
  .c-gray > text.ts { fill: #5F5E5A; }
  .c-blue > rect, .c-blue > circle, .c-blue > ellipse, .c-blue > polygon { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text.th, .c-blue > text.t { fill: #0C447C; }
  .c-blue > text.ts { fill: #185FA5; }
  .c-teal > rect, .c-teal > circle, .c-teal > ellipse, .c-teal > polygon { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > text.th, .c-teal > text.t { fill: #085041; }
  .c-teal > text.ts { fill: #0F6E56; }
  .c-purple > rect, .c-purple > circle, .c-purple > ellipse, .c-purple > polygon { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text.th, .c-purple > text.t { fill: #3C3489; }
  .c-purple > text.ts { fill: #534AB7; }
  .c-coral > rect, .c-coral > circle, .c-coral > ellipse, .c-coral > polygon { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text.th, .c-coral > text.t { fill: #712B13; }
  .c-coral > text.ts { fill: #993C1D; }
  .c-pink > rect, .c-pink > circle, .c-pink > ellipse, .c-pink > polygon { fill: #FBEAF0; stroke: #993556; }
  .c-pink > text.th, .c-pink > text.t { fill: #72243E; }
  .c-pink > text.ts { fill: #993556; }
  .c-green > rect, .c-green > circle, .c-green > ellipse, .c-green > polygon { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green > text.th, .c-green > text.t { fill: #27500A; }
  .c-green > text.ts { fill: #3B6D11; }
  .c-amber > rect, .c-amber > circle, .c-amber > ellipse, .c-amber > polygon { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > text.th, .c-amber > text.t { fill: #633806; }
  .c-amber > text.ts { fill: #854F0B; }
  .c-red > rect, .c-red > circle, .c-red > ellipse, .c-red > polygon { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red > text.th, .c-red > text.t { fill: #791F1F; }
  .c-red > text.ts { fill: #A32D2D; }
</style>
<rect x="0" y="0" width="680" height="780" fill="#FAFAF7"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray">
<rect x="250" y="30" width="180" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Login</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">JWT + IP binding</text>
</g>
<line x1="340" y1="78" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="150" y="108" width="380" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">Home · Mis solicitudes</text>
<text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">Listado con estado viaje + estado anticipo</text>
<text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central">Acciones: crear · abrir · filtrar · ver wallet</text>
</g>

<line x1="230" y1="188" x2="130" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="188" x2="340" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="188" x2="550" y2="220" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="220" width="180" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="240" text-anchor="middle" dominant-baseline="central">Mis borradores</text>
<text class="ts" x="130" y="258" text-anchor="middle" dominant-baseline="central">Autoguardados 30s</text>
<text class="ts" x="130" y="274" text-anchor="middle" dominant-baseline="central">US-21</text>
<text class="ts" x="130" y="294" text-anchor="middle" dominant-baseline="central">Acciones: continuar</text>
<text class="ts" x="130" y="308" text-anchor="middle" dominant-baseline="central">eliminar · limpieza 30d</text>
</g>

<g class="c-teal">
<rect x="250" y="220" width="180" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central">Crear solicitud</text>
<text class="ts" x="340" y="258" text-anchor="middle" dominant-baseline="central">Viaje + anticipo</text>
<text class="ts" x="340" y="274" text-anchor="middle" dominant-baseline="central">avión + hotel</text>
<text class="ts" x="340" y="294" text-anchor="middle" dominant-baseline="central">Multidestino por tramo</text>
<text class="ts" x="340" y="308" text-anchor="middle" dominant-baseline="central">Alerta si excede política</text>
</g>

<g class="c-teal">
<rect x="460" y="220" width="180" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="240" text-anchor="middle" dominant-baseline="central">Mi wallet</text>
<text class="ts" x="550" y="258" text-anchor="middle" dominant-baseline="central">Saldo anticipos</text>
<text class="ts" x="550" y="274" text-anchor="middle" dominant-baseline="central">Historial reembolsos</text>
<text class="ts" x="550" y="294" text-anchor="middle" dominant-baseline="central">Acciones: ver detalle</text>
<text class="ts" x="550" y="308" text-anchor="middle" dominant-baseline="central">descargar estado</text>
</g>

<line x1="340" y1="316" x2="340" y2="346" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="250" y="346" width="180" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central">Enviar</text>
<text class="ts" x="340" y="380" text-anchor="middle" dominant-baseline="central">Estado 2 · Pendiente N1</text>
</g>

<line x1="340" y1="394" x2="340" y2="424" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="150" y="424" width="380" height="112" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="446" text-anchor="middle" dominant-baseline="central">Detalle de mi solicitud</text>
<text class="ts" x="340" y="466" text-anchor="middle" dominant-baseline="central">Historial y trazabilidad · US-19</text>
<text class="ts" x="340" y="482" text-anchor="middle" dominant-baseline="central">Chat de comentarios · US-22</text>
<text class="ts" x="340" y="500" text-anchor="middle" dominant-baseline="central">Acciones: cancelar si estado 1 a 4</text>
<text class="ts" x="340" y="516" text-anchor="middle" dominant-baseline="central">subir comprobantes si estado 6</text>
</g>

<line x1="340" y1="536" x2="340" y2="566" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="566" width="280" height="112" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="588" text-anchor="middle" dominant-baseline="central">Comprobar nacional</text>
<text class="ts" x="180" y="608" text-anchor="middle" dominant-baseline="central">Drag drop XML + PDF</text>
<text class="ts" x="180" y="624" text-anchor="middle" dominant-baseline="central">Extrae datos automáticos</text>
<text class="ts" x="180" y="642" text-anchor="middle" dominant-baseline="central">Valida contra SAT</text>
<text class="ts" x="180" y="658" text-anchor="middle" dominant-baseline="central">US-01 US-02 US-03</text>
</g>

<g class="c-teal">
<rect x="360" y="566" width="280" height="112" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="588" text-anchor="middle" dominant-baseline="central">Comprobar internacional</text>
<text class="ts" x="500" y="608" text-anchor="middle" dominant-baseline="central">Foto o PDF del recibo</text>
<text class="ts" x="500" y="624" text-anchor="middle" dominant-baseline="central">Captura manual + país</text>
<text class="ts" x="500" y="642" text-anchor="middle" dominant-baseline="central">TC vía Banxico US-04</text>
<text class="ts" x="500" y="658" text-anchor="middle" dominant-baseline="central">US-25 · NT-041</text>
</g>

<path d="M 180 678 L 180 708 L 340 708 L 340 708" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M 500 678 L 500 708 L 340 708 L 340 708" class="arr" fill="none" marker-end="url(#arrow)"/>

<g class="c-green">
<rect x="250" y="710" width="180" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="728" text-anchor="middle" dominant-baseline="central">Confirmar envío</text>
<text class="ts" x="340" y="744" text-anchor="middle" dominant-baseline="central">Pasa a revisión finanzas</text>
</g>

</svg>