<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 880" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa7b4"/>
    </marker>
    <style>
      .lbl{fill:#e6edf3;font-size:13px}
      .grpt{font-size:12px;font-weight:700}
      .tt{fill:#fff;font-size:13px;font-weight:700}
      .ts{fill:#f2f2f2;font-size:10.5px;opacity:.92}
      .edge{stroke:#9aa7b4;stroke-width:1.6;fill:none;marker-end:url(#arr2)}
      .edged{stroke:#9aa7b4;stroke-width:1.3;fill:none;stroke-dasharray:5 4;marker-end:url(#arr2)}
      .el{font-size:10px;fill:#cdd9e5}
      .muted{fill:#9aa7b4;font-size:11px}
      .note{fill:#8ce8df;font-size:10.5px}
    </style>
  </defs>

  <rect x="0" y="0" width="1020" height="880" rx="16" fill="#0f1622"/>
  <text x="24" y="34" fill="#e6edf3" font-size="17" font-weight="700">Arquitectura recomendada — Multi-AZ, segura (producción)</text>

  <!-- Internet -->
  <rect x="420" y="52" width="180" height="36" rx="18" fill="#1c2530" stroke="#6b7785"/>
  <text x="510" y="75" text-anchor="middle" class="lbl">Internet / Usuario</text>

  <!-- Edge layer: Route53, WAF, CloudFront, ACM -->
  <rect x="70" y="120" width="200" height="58" rx="9" fill="#C2407A"/>
  <text x="170" y="144" text-anchor="middle" class="tt">Amazon Route 53</text>
  <text x="170" y="161" text-anchor="middle" class="ts">DNS + health checks</text>

  <rect x="420" y="118" width="180" height="40" rx="9" fill="#DD344C"/>
  <text x="510" y="143" text-anchor="middle" class="tt">AWS WAF (reglas L7)</text>

  <rect x="420" y="170" width="180" height="52" rx="9" fill="#8C4FFF"/>
  <text x="510" y="192" text-anchor="middle" class="tt">Amazon CloudFront</text>
  <text x="510" y="209" text-anchor="middle" class="ts">CDN + TLS en el edge</text>

  <rect x="730" y="120" width="210" height="58" rx="9" fill="#C2407A"/>
  <text x="835" y="144" text-anchor="middle" class="tt">AWS Certificate Manager</text>
  <text x="835" y="161" text-anchor="middle" class="ts">certificados TLS públicos</text>

  <!-- AWS account -->
  <rect x="24" y="246" width="972" height="600" rx="14" fill="none" stroke="#ff9900" stroke-width="1.5"/>
  <text x="40" y="270" class="grpt" fill="#ffb84d">AWS · us-east-1 · Multi-AZ</text>

  <!-- VPC -->
  <rect x="44" y="284" width="636" height="540" rx="12" fill="none" stroke="#a371f7" stroke-width="1.5"/>
  <text x="60" y="306" class="grpt" fill="#c9b6ff">VPC · subnets públicas + privadas (2 AZ)</text>

  <!-- ALB (public subnets) -->
  <rect x="210" y="320" width="300" height="50" rx="9" fill="#8C4FFF"/>
  <text x="360" y="342" text-anchor="middle" class="tt">Application Load Balancer</text>
  <text x="360" y="358" text-anchor="middle" class="ts">HTTPS :443 · subnets públicas (2 AZ)</text>

  <!-- AZ A -->
  <rect x="64" y="394" width="296" height="150" rx="10" fill="none" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="80" y="413" class="grpt" fill="#8ce8df">AZ A · subnet privada</text>
  <rect x="84" y="424" width="256" height="104" rx="9" fill="#ED7100"/>
  <text x="212" y="452" text-anchor="middle" class="tt">App (front + back)</text>
  <text x="212" y="470" text-anchor="middle" class="ts">ECS Fargate / EC2 ASG</text>
  <text x="212" y="486" text-anchor="middle" class="ts">+ Security Group</text>

  <!-- AZ B -->
  <rect x="368" y="394" width="296" height="150" rx="10" fill="none" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="384" y="413" class="grpt" fill="#8ce8df">AZ B · subnet privada</text>
  <rect x="388" y="424" width="256" height="104" rx="9" fill="#ED7100"/>
  <text x="516" y="452" text-anchor="middle" class="tt">App (front + back)</text>
  <text x="516" y="470" text-anchor="middle" class="ts">ECS Fargate / EC2 ASG</text>
  <text x="516" y="486" text-anchor="middle" class="ts">+ Security Group</text>

  <!-- DB private subnets -->
  <rect x="64" y="566" width="600" height="120" rx="10" fill="none" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="80" y="585" class="grpt" fill="#8ce8df">Subnets privadas de BD (2 AZ) · Security Group propio</text>
  <rect x="190" y="596" width="348" height="74" rx="9" fill="#2E73B8"/>
  <text x="364" y="623" text-anchor="middle" class="tt">Amazon RDS PostgreSQL</text>
  <text x="364" y="641" text-anchor="middle" class="ts">Multi-AZ: primary + standby</text>
  <text x="364" y="657" text-anchor="middle" class="ts">failover automático · cifrado en reposo</text>

  <text x="60" y="712" class="note">Security Groups por capa: ALB → App → RDS (mínimo privilegio de red).</text>
  <text x="60" y="730" class="note">Apps y BD en subnets privadas (sin IP pública); salida vía NAT.</text>

  <!-- Right column: S3, Secrets, CloudWatch, IAM -->
  <rect x="704" y="300" width="262" height="74" rx="9" fill="#3FA037"/>
  <text x="835" y="328" text-anchor="middle" class="tt">Amazon S3 (privado)</text>
  <text x="835" y="346" text-anchor="middle" class="ts">SSE + versioning</text>
  <text x="835" y="362" text-anchor="middle" class="ts">OAC desde CloudFront</text>

  <rect x="704" y="390" width="262" height="68" rx="9" fill="#DD344C"/>
  <text x="835" y="416" text-anchor="middle" class="tt">AWS Secrets Manager</text>
  <text x="835" y="434" text-anchor="middle" class="ts">JWT/AES/CHAT + rotación</text>

  <rect x="704" y="474" width="262" height="68" rx="9" fill="#C2407A"/>
  <text x="835" y="500" text-anchor="middle" class="tt">Amazon CloudWatch</text>
  <text x="835" y="518" text-anchor="middle" class="ts">logs · métricas · alarmas</text>

  <rect x="704" y="558" width="262" height="68" rx="9" fill="#DD344C"/>
  <text x="835" y="584" text-anchor="middle" class="tt">IAM roles (por tarea)</text>
  <text x="835" y="602" text-anchor="middle" class="ts">least-privilege · sin llaves estáticas</text>

  <!-- edges: edge layer -->
  <path class="edged" d="M460,70 V100 H170 V120"/>
  <rect x="300" y="92" width="70" height="16" rx="3" fill="#0f1622"/><text x="335" y="104" text-anchor="middle" class="el">DNS</text>
  <path class="edge" d="M510,88 V118"/>
  <path class="edge" d="M510,158 V170"/>
  <rect x="520" y="92" width="62" height="16" rx="3" fill="#0f1622"/><text x="551" y="104" text-anchor="middle" class="el">HTTPS</text>
  <path class="edged" d="M730,150 H600"/>
  <rect x="612" y="124" width="56" height="16" rx="3" fill="#0f1622"/><text x="640" y="136" text-anchor="middle" class="el">cert</text>

  <!-- CloudFront -> ALB -->
  <path class="edge" d="M510,222 V320"/>
  <rect x="520" y="280" width="64" height="16" rx="3" fill="#0f1622"/><text x="552" y="292" text-anchor="middle" class="el">origin</text>
  <!-- ACM -> ALB -->
  <path class="edged" d="M835,178 V346 H510"/>

  <!-- ALB -> apps -->
  <path class="edge" d="M300,370 V382 H212 V424"/>
  <path class="edge" d="M430,370 V382 H516 V424"/>
  <rect x="300" y="374" width="120" height="16" rx="3" fill="#0f1622"/><text x="360" y="386" text-anchor="middle" class="el">reparte tráfico (2 AZ)</text>

  <!-- apps -> RDS -->
  <path class="edge" d="M212,528 V596"/>
  <path class="edge" d="M516,528 V596"/>
  <rect x="300" y="566" width="120" height="16" rx="3" fill="#0f1622"/><text x="360" y="578" text-anchor="middle" class="el">lectura / escritura</text>

  <!-- apps -> S3 / Secrets / CloudWatch (bundle desde App B) -->
  <path class="edge" d="M644,452 H680 V336 H704"/>
  <rect x="556" y="424" width="120" height="16" rx="3" fill="#0f1622"/><text x="616" y="436" text-anchor="middle" class="el">S3 (IAM role)</text>
  <path class="edged" d="M644,472 H686 V420 H704"/>
  <path class="edged" d="M644,500 H672 V506 H704"/>
  <rect x="556" y="500" width="116" height="16" rx="3" fill="#0f1622"/><text x="614" y="512" text-anchor="middle" class="el">secretos · logs</text>
  <!-- IAM -> apps -->
  <path class="edged" d="M704,588 H660 V500 H644"/>

  <!-- legend -->
  <g transform="translate(40,838)">
    <rect x="0" y="-10" width="13" height="13" rx="3" fill="#ED7100"/><text x="18" y="1" class="muted">Cómputo</text>
    <rect x="92" y="-10" width="13" height="13" rx="3" fill="#8C4FFF"/><text x="110" y="1" class="muted">Red / balanceo</text>
    <rect x="232" y="-10" width="13" height="13" rx="3" fill="#3FA037"/><text x="250" y="1" class="muted">Almacenamiento</text>
    <rect x="378" y="-10" width="13" height="13" rx="3" fill="#2E73B8"/><text x="396" y="1" class="muted">Base de datos</text>
    <rect x="498" y="-10" width="13" height="13" rx="3" fill="#DD344C"/><text x="516" y="1" class="muted">Seguridad</text>
    <rect x="592" y="-10" width="13" height="13" rx="3" fill="#C2407A"/><text x="610" y="1" class="muted">DNS / gestionado</text>
  </g>
</svg>
