<text class="ts" x="500" y="694" text-anchor="middle" dominant-baseline="central">Revalidaciones SAT</text>
</g>

<g class="c-green">
<rect x="150" y="720" width="380" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="738" text-anchor="middle" dominant-baseline="central">Activar tenant</text>
<text class="ts" x="340" y="754" text-anchor="middle" dominant-baseline="central">Pasa de configuración a operativo</text>
</g>

</svg>