<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" width="680" height="660" role="img">
<title>Flujo de pantallas del rol N1 jefe directo</title>
<desc>Bandeja de aprobación del jefe directo con decisión paralela de viaje y anticipo</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .t { font-size: 14px; fill: #1a1a1a; font-weight: 400; }
  .ts { font-size: 12px; fill: #5F5E5A; font-weight: 400; }
  .th { font-size: 14px; fill: #1a1a1a; font-weight: 500; }
  .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
  .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 2 2; }
  .box { fill: #F5F4F0; stroke: rgba(0,0,0,0.15); }
  .c-gray > rect, .c-gray > circle, .c-gray > ellipse, .c-gray > polygon { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray > text.th, .c-gray > text.t { fill: #444441; }
  .c-gray > text.ts { fill: #5F5E5A; }
  .c-blue > rect, .c-blue > circle, .c-blue > ellipse, .c-blue > polygon { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text.th, .c-blue > text.t { fill: #0C447C; }
  .c-blue > text.ts { fill: #185FA5; }
  .c-teal > rect, .c-teal > circle, .c-teal > ellipse, .c-teal > polygon { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > text.th, .c-teal > text.t { fill: #085041; }
  .c-teal > text.ts { fill: #0F6E56; }
  .c-purple > rect, .c-purple > circle, .c-purple > ellipse, .c-purple > polygon { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text.th, .c-purple > text.t { fill: #3C3489; }
  .c-purple > text.ts { fill: #534AB7; }
  .c-coral > rect, .c-coral > circle, .c-coral > ellipse, .c-coral > polygon { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text.th, .c-coral > text.t { fill: #712B13; }
  .c-coral > text.ts { fill: #993C1D; }
  .c-pink > rect, .c-pink > circle, .c-pink > ellipse, .c-pink > polygon { fill: #FBEAF0; stroke: #993556; }
  .c-pink > text.th, .c-pink > text.t { fill: #72243E; }
  .c-pink > text.ts { fill: #993556; }
  .c-green > rect, .c-green > circle, .c-green > ellipse, .c-green > polygon { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green > text.th, .c-green > text.t { fill: #27500A; }
  .c-green > text.ts { fill: #3B6D11; }
  .c-amber > rect, .c-amber > circle, .c-amber > ellipse, .c-amber > polygon { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > text.th, .c-amber > text.t { fill: #633806; }
  .c-amber > text.ts { fill: #854F0B; }
  .c-red > rect, .c-red > circle, .c-red > ellipse, .c-red > polygon { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red > text.th, .c-red > text.t { fill: #791F1F; }
  .c-red > text.ts { fill: #A32D2D; }
</style>
<rect x="0" y="0" width="680" height="660" fill="#FAFAF7"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray">
<rect x="250" y="30" width="180" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Login</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">JWT + IP binding</text>
</g>
<line x1="340" y1="78" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="150" y="108" width="380" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">Bandeja de aprobación</text>
<text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">Solicitudes pendientes de mi equipo</text>
<text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central">Filtros: urgencia · monto · destino</text>
<text class="ts" x="340" y="184" text-anchor="middle" dominant-baseline="central">Icono de campana con no leídos</text>
</g>

<line x1="230" y1="204" x2="130" y2="234" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="204" x2="340" y2="234" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="204" x2="550" y2="234" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="234" width="180" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="254" text-anchor="middle" dominant-baseline="central">Notificaciones</text>
<text class="ts" x="130" y="272" text-anchor="middle" dominant-baseline="central">Portal + correo</text>
<text class="ts" x="130" y="288" text-anchor="middle" dominant-baseline="central">US-20 · configurable</text>
</g>

<g class="c-teal">
<rect x="250" y="234" width="180" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="254" text-anchor="middle" dominant-baseline="central">Historial aprobaciones</text>
<text class="ts" x="340" y="272" text-anchor="middle" dominant-baseline="central">Lo que ya decidí</text>
<text class="ts" x="340" y="288" text-anchor="middle" dominant-baseline="central">Filtro por fecha</text>
</g>

<g class="c-teal">
<rect x="460" y="234" width="180" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="254" text-anchor="middle" dominant-baseline="central">Mi equipo</text>
<text class="ts" x="550" y="272" text-anchor="middle" dominant-baseline="central">Reportes directos</text>
<text class="ts" x="550" y="288" text-anchor="middle" dominant-baseline="central">Gasto acumulado</text>
</g>

<line x1="340" y1="306" x2="340" y2="336" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="150" y="336" width="380" height="128" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="358" text-anchor="middle" dominant-baseline="central">Detalle de solicitud</text>
<text class="ts" x="340" y="378" text-anchor="middle" dominant-baseline="central">Resumen · solicitante · destino · desglose</text>
<text class="ts" x="340" y="394" text-anchor="middle" dominant-baseline="central">Timeline de trazabilidad · US-19</text>
<text class="ts" x="340" y="410" text-anchor="middle" dominant-baseline="central">Chat de comentarios · US-22</text>
<text class="ts" x="340" y="428" text-anchor="middle" dominant-baseline="central">Decisión viaje: aprobar · rechazar con comentario</text>
<text class="ts" x="340" y="444" text-anchor="middle" dominant-baseline="central">Decisión anticipo: aprobar · rechazar</text>
</g>

<line x1="260" y1="464" x2="180" y2="494" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="464" x2="340" y2="494" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="464" x2="500" y2="494" class="arr" marker-end="url(#arrow)"/>

<g class="c-green">
<rect x="40" y="494" width="260" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="514" text-anchor="middle" dominant-baseline="central">Aprobar</text>
<text class="ts" x="170" y="534" text-anchor="middle" dominant-baseline="central">Escala a N2 si tenant lo requiere</text>
</g>

<g class="c-amber">
<rect x="310" y="494" width="60" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="520" text-anchor="middle" dominant-baseline="central">Reasignar</text>
<text class="ts" x="340" y="536" text-anchor="middle" dominant-baseline="central">US-23</text>
</g>

<g class="c-red">
<rect x="380" y="494" width="260" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="514" text-anchor="middle" dominant-baseline="central">Rechazar</text>
<text class="ts" x="510" y="534" text-anchor="middle" dominant-baseline="central">Requiere comentario obligatorio</text>
</g>

<line x1="170" y1="554" x2="170" y2="584" class="arr" marker-end="url(#arrow)"/>
<line x1="510" y1="554" x2="510" y2="584" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="40" y="584" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="604" text-anchor="middle" dominant-baseline="central">Solicitud continúa el flujo</text>
<text class="ts" x="170" y="620" text-anchor="middle" dominant-baseline="central">Notifica al solicitante</text>
</g>

<g class="c-gray">
<rect x="380" y="584" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="604" text-anchor="middle" dominant-baseline="central">Solicitud termina</text>
<text class="ts" x="510" y="620" text-anchor="middle" dominant-baseline="central">Estado 9 · notifica solicitante</text>
</g>

</svg>