<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720" width="680" height="720" role="img">
<title>Flujo de pantallas del rol Admin de la organización</title>
<desc>Panel del admin de la empresa cliente para configurar políticas workflow y roles</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .t { font-size: 14px; fill: #1a1a1a; font-weight: 400; }
  .ts { font-size: 12px; fill: #5F5E5A; font-weight: 400; }
  .th { font-size: 14px; fill: #1a1a1a; font-weight: 500; }
  .arr { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
  .leader { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 2 2; }
  .box { fill: #F5F4F0; stroke: rgba(0,0,0,0.15); }
  .c-gray > rect, .c-gray > circle, .c-gray > ellipse, .c-gray > polygon { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray > text.th, .c-gray > text.t { fill: #444441; }
  .c-gray > text.ts { fill: #5F5E5A; }
  .c-blue > rect, .c-blue > circle, .c-blue > ellipse, .c-blue > polygon { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text.th, .c-blue > text.t { fill: #0C447C; }
  .c-blue > text.ts { fill: #185FA5; }
  .c-teal > rect, .c-teal > circle, .c-teal > ellipse, .c-teal > polygon { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > text.th, .c-teal > text.t { fill: #085041; }
  .c-teal > text.ts { fill: #0F6E56; }
  .c-purple > rect, .c-purple > circle, .c-purple > ellipse, .c-purple > polygon { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text.th, .c-purple > text.t { fill: #3C3489; }
  .c-purple > text.ts { fill: #534AB7; }
  .c-coral > rect, .c-coral > circle, .c-coral > ellipse, .c-coral > polygon { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text.th, .c-coral > text.t { fill: #712B13; }
  .c-coral > text.ts { fill: #993C1D; }
  .c-pink > rect, .c-pink > circle, .c-pink > ellipse, .c-pink > polygon { fill: #FBEAF0; stroke: #993556; }
  .c-pink > text.th, .c-pink > text.t { fill: #72243E; }
  .c-pink > text.ts { fill: #993556; }
  .c-green > rect, .c-green > circle, .c-green > ellipse, .c-green > polygon { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green > text.th, .c-green > text.t { fill: #27500A; }
  .c-green > text.ts { fill: #3B6D11; }
  .c-amber > rect, .c-amber > circle, .c-amber > ellipse, .c-amber > polygon { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > text.th, .c-amber > text.t { fill: #633806; }
  .c-amber > text.ts { fill: #854F0B; }
  .c-red > rect, .c-red > circle, .c-red > ellipse, .c-red > polygon { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red > text.th, .c-red > text.t { fill: #791F1F; }
  .c-red > text.ts { fill: #A32D2D; }
</style>
<rect x="0" y="0" width="680" height="720" fill="#FAFAF7"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray">
<rect x="250" y="30" width="180" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Login</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">JWT + IP binding</text>
</g>
<line x1="340" y1="78" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="150" y="108" width="380" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">Dashboard ejecutivo</text>
<text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">Gasto total · por centro de costos · US-18</text>
<text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central">Alertas presupuesto · solicitudes del mes</text>
<text class="ts" x="340" y="184" text-anchor="middle" dominant-baseline="central">Export Excel · tiempo real</text>
</g>

<line x1="215" y1="204" x2="130" y2="234" class="arr" marker-end="url(#arrow)"/>
<line x1="300" y1="204" x2="260" y2="234" class="arr" marker-end="url(#arrow)"/>
<line x1="380" y1="204" x2="420" y2="234" class="arr" marker-end="url(#arrow)"/>
<line x1="465" y1="204" x2="550" y2="234" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="40" y="234" width="180" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="256" text-anchor="middle" dominant-baseline="central">Políticas de viaje</text>
<text class="ts" x="130" y="276" text-anchor="middle" dominant-baseline="central">US-12</text>
<text class="ts" x="130" y="294" text-anchor="middle" dominant-baseline="central">Topes hotel y vuelo</text>
<text class="ts" x="130" y="310" text-anchor="middle" dominant-baseline="central">por destino y categoría</text>
</g>

<g class="c-purple">
<rect x="240" y="234" width="180" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="330" y="256" text-anchor="middle" dominant-baseline="central">Workflow de aprobación</text>
<text class="ts" x="330" y="276" text-anchor="middle" dominant-baseline="central">US-16</text>
<text class="ts" x="330" y="294" text-anchor="middle" dominant-baseline="central">Niveles · reglas · montos</text>
<text class="ts" x="330" y="310" text-anchor="middle" dominant-baseline="central">Simulador previo</text>
</g>

<g class="c-purple">
<rect x="440" y="234" width="180" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="530" y="256" text-anchor="middle" dominant-baseline="central">Roles y permisos</text>
<text class="ts" x="530" y="276" text-anchor="middle" dominant-baseline="central">US-14</text>
<text class="ts" x="530" y="294" text-anchor="middle" dominant-baseline="central">Catálogo personalizable</text>
<text class="ts" x="530" y="310" text-anchor="middle" dominant-baseline="central">Monto máximo por rol</text>
</g>

<line x1="130" y1="330" x2="130" y2="360" class="arr" marker-end="url(#arrow)"/>
<line x1="330" y1="330" x2="330" y2="360" class="arr" marker-end="url(#arrow)"/>
<line x1="530" y1="330" x2="530" y2="360" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="40" y="360" width="180" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="380" text-anchor="middle" dominant-baseline="central">Editor política</text>
<text class="ts" x="130" y="398" text-anchor="middle" dominant-baseline="central">Crear · editar · archivar</text>
<text class="ts" x="130" y="414" text-anchor="middle" dominant-baseline="central">Con vigencia fecha</text>
</g>

<g class="c-gray">
<rect x="240" y="360" width="180" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="330" y="380" text-anchor="middle" dominant-baseline="central">Editor workflow</text>
<text class="ts" x="330" y="398" text-anchor="middle" dominant-baseline="central">Configurar reglas</text>
<text class="ts" x="330" y="414" text-anchor="middle" dominant-baseline="central">escalado y umbrales</text>
</g>

<g class="c-gray">
<rect x="440" y="360" width="180" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="530" y="380" text-anchor="middle" dominant-baseline="central">Editor rol</text>
<text class="ts" x="530" y="398" text-anchor="middle" dominant-baseline="central">Permisos por pantalla</text>
<text class="ts" x="530" y="414" text-anchor="middle" dominant-baseline="central">Asignar usuarios</text>
</g>

<g class="c-purple">
<rect x="40" y="462" width="280" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="482" text-anchor="middle" dominant-baseline="central">Directorio de empleados</text>
<text class="ts" x="180" y="500" text-anchor="middle" dominant-baseline="central">Jerarquía N1 y N2 por empleado</text>
<text class="ts" x="180" y="516" text-anchor="middle" dominant-baseline="central">Centros de costos asignados</text>
</g>

<g class="c-purple">
<rect x="360" y="462" width="280" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="482" text-anchor="middle" dominant-baseline="central">Presupuestos por área</text>
<text class="ts" x="500" y="500" text-anchor="middle" dominant-baseline="central">Asignar y ajustar límites</text>
<text class="ts" x="500" y="516" text-anchor="middle" dominant-baseline="central">Alertas automáticas</text>
</g>

<g class="c-purple">
<rect x="40" y="552" width="280" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="572" text-anchor="middle" dominant-baseline="central">Reportes ejecutivos</text>
<text class="ts" x="180" y="590" text-anchor="middle" dominant-baseline="central">Por periodo y centro de costos</text>
<text class="ts" x="180" y="606" text-anchor="middle" dominant-baseline="central">Export Excel o PDF</text>
</g>

<g class="c-purple">
<rect x="360" y="552" width="280" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="572" text-anchor="middle" dominant-baseline="central">Auditoría y trazabilidad</text>
<text class="ts" x="500" y="590" text-anchor="middle" dominant-baseline="central">Log de cambios en config</text>
<text class="ts" x="500" y="606" text-anchor="middle" dominant-baseline="central">Consumos de API contable</text>
</g>

<g class="c-gray">
<rect x="150" y="648" width="380" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="666" text-anchor="middle" dominant-baseline="central">Configuración del tenant</text>
<text class="ts" x="340" y="682" text-anchor="middle" dominant-baseline="central">Logo · zona horaria · moneda · notificaciones</text>
</g>

</svg>