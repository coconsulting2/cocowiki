<text class="ts" x="180" y="678" text-anchor="middle" dominant-baseline="central">Generar · revocar · log consumos</text>
<text class="ts" x="180" y="694" text-anchor="middle" dominant-baseline="central">Expiración anual</text>
</g>

<g class="c-purple">
