name: Deploy to EC2

# Auto-deploy: en cada push a main (o manualmente) hace SSH a la instancia EC2
# y re-corre install.sh, que hace git pull (main) + rebuild + up -d del stack.
#
# Requiere estos Secrets en el repo (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY   clave privada (contenido de coco-deploy.pem)
#   DEPLOY_HOST      DNS/IP público de la instancia (Elastic IP)
#   DEPLOY_USER      usuario SSH (opcional; default ec2-user)
# Si faltan los secrets, el job termina OK sin desplegar (no rompe el CI).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ]; then
            echo "::warning::Faltan DEPLOY_SSH_KEY / DEPLOY_HOST — se omite el deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/deploy_key "${DEPLOY_USER:-ec2-user}@${HOST}" \
              'curl -fsSL https://raw.githubusercontent.com/coconsulting2/cocowiki/main/deploy/install.sh -o install.sh && bash install.sh'
