<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <title>Cocowiki</title>

  <!-- Theme (simple dark) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

   <!-- Custom Styles -->
   <style>
     :root {
       /* --theme-hue: 325; */
     }
   </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
    window.$docsify = window.$docsify || {};
    (function () {
        if (!/^https?:$/i.test(location.protocol)) return;
        var pathname = location.pathname.replace(/\/index\.html$/i, '/');
        if (!pathname.endsWith('/')) pathname += '/';
        var segments = pathname.split('/').filter(Boolean);
        if (segments.length > 0) {
            window.$docsify.basePath = '/' + segments.join('/') + '/';
        }
    })();
    window.$docsify = Object.assign(window.$docsify, {
        name: "",
        repo: "",
        loadSidebar: true,
        subMaxLevel: 5,
        alias: {
            '/.*/_sidebar.md': '_sidebar.md'
        },
        subMaxLevel: 5,
        themeable: {
            readyTransition: true,
            responsiveTables: true
        }
    });
</script>
   <!-- Docsify (v4) themeable + Mermaid -->
   <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
