<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <title>Cocowiki</title>

  <!-- Theme (simple dark) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

   <!-- Custom Styles -->
   <style>
     :root {
       /* --theme-hue: 325; */
     }
   </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
    window.$docsify = window.$docsify || {};
    (function () {
        if (!/^https?:$/i.test(location.protocol)) return;
        var pathname = location.pathname.replace(/\/index\.html$/i, '/');
        if (!pathname.endsWith('/')) pathname += '/';
        var segments = pathname.split('/').filter(Boolean);
        if (segments.length > 0) {
            window.$docsify.basePath = '/' + segments.join('/') + '/';
        }
    })();
    window.$docsify = Object.assign(window.$docsify, {
        name: "",
        repo: "",
        loadSidebar: true,
        subMaxLevel: 5,
        alias: {
            '/.*/_sidebar.md': '_sidebar.md'
        },
        themeable: {
            readyTransition: true,
            responsiveTables: true
        }
    });
</script>
   <!-- Docsify (v4) themeable + Mermaid -->
   <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
   <!-- Después de zoom-image (reordena plugins): rutas de imágenes siempre respecto a la raíz del sitio Docsify -->
   <script>
    (function () {
        function staticSiteBase() {
            var bp = (window.$docsify && window.$docsify.basePath) || '/';
            if (bp !== '/' && bp.slice(-1) !== '/') bp += '/';
            if (bp === '/') return location.origin + '/';
            return location.origin + bp;
        }
        function rewriteImageMarkdown(md) {
            if (!/^https?:$/i.test(location.protocol)) return md;
            var base = staticSiteBase();
            try {
                return md
                    .replace(/!\[([^\]]*)\]\(\.\/images\/([^)]+)\)/g, function (_, alt, rest) {
                        return '![' + alt + '](' + new URL('./images/' + rest, base).href + ')';
                    })
                    .replace(/!\[([^\]]*)\]\(\/images\/([^)]+)\)/g, function (_, alt, rest) {
                        return '![' + alt + '](' + new URL('./images/' + rest, base).href + ')';
                    });
            } catch (e) {
                return md;
            }
        }
        function fixDiagramImagesInDom() {
            if (!/^https?:$/i.test(location.protocol)) return;
            var base = staticSiteBase();
            var section = document.querySelector('.markdown-section');
            if (!section) return;
            section.querySelectorAll('img').forEach(function (img) {
                if (img.classList && img.classList.contains('emoji')) return;
                var s = img.getAttribute('src');
                if (!s) return;
                var m = s.match(/diagrams\/pantallas\/[^/?#"']+\.(?:png|svg|jpe?g)/i);
                if (!m) return;
                try {
                    var fixed = new URL('./images/' + m[0], base).href;
                    if (img.src !== fixed) img.src = fixed;
                    if (img.hasAttribute('data-origin')) img.setAttribute('data-origin', fixed);
                } catch (e) { /* ignore */ }
            });
        }
        window.$docsify.plugins = (window.$docsify.plugins || []).concat([
            function (hook) {
                hook.beforeEach(rewriteImageMarkdown);
                hook.doneEach(fixDiagramImagesInDom);
            }
        ]);
    })();
   </script>
</body>
</html>
