<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 660" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa7b4"/>
    </marker>
    <style>
      .lbl{fill:#e6edf3;font-size:13px}
      .grpt{font-size:12px;font-weight:700}
      .tt{fill:#fff;font-size:13.5px;font-weight:700}
      .ts{fill:#f2f2f2;font-size:11px;opacity:.92}
      .edge{stroke:#9aa7b4;stroke-width:1.6;fill:none;marker-end:url(#arr2)}
      .edged{stroke:#9aa7b4;stroke-width:1.4;fill:none;stroke-dasharray:5 4;marker-end:url(#arr2)}
      .el{font-size:10.5px;fill:#cdd9e5}
      .muted{fill:#9aa7b4;font-size:11px}
    </style>
  </defs>

  <rect x="0" y="0" width="940" height="660" rx="16" fill="#0f1622"/>
  <text x="24" y="34" fill="#e6edf3" font-size="17" font-weight="700">Arquitectura recomendada — Multi-AZ (producción)</text>

  <!-- Internet -->
  <rect x="370" y="46" width="200" height="36" rx="18" fill="#1c2530" stroke="#6b7785"/>
  <text x="470" y="69" text-anchor="middle" class="lbl">Internet / Usuario</text>

  <!-- CloudFront -->
  <rect x="370" y="104" width="200" height="48" rx="9" fill="#8C4FFF"/>
  <text x="470" y="126" text-anchor="middle" class="tt">Amazon CloudFront</text>
  <text x="470" y="142" text-anchor="middle" class="ts">CDN (opcional)</text>

  <!-- AWS account -->
  <rect x="24" y="176" width="892" height="468" rx="14" fill="none" stroke="#ff9900" stroke-width="1.5"/>
  <text x="40" y="200" class="grpt" fill="#ffb84d">AWS · us-east-1 · Multi-AZ</text>

  <!-- ALB -->
  <rect x="300" y="212" width="340" height="52" rx="9" fill="#8C4FFF"/>
  <text x="470" y="234" text-anchor="middle" class="tt">Application Load Balancer</text>
  <text x="470" y="250" text-anchor="middle" class="ts">HTTPS :443 · listener + ACM</text>

  <!-- ACM -->
  <rect x="672" y="212" width="216" height="52" rx="9" fill="#C2407A"/>
  <text x="780" y="234" text-anchor="middle" class="tt">AWS Certificate Manager</text>
  <text x="780" y="250" text-anchor="middle" class="ts">cert TLS público</text>

  <!-- VPC -->
  <rect x="44" y="284" width="612" height="344" rx="12" fill="none" stroke="#a371f7" stroke-width="1.5"/>
  <text x="60" y="306" class="grpt" fill="#c9b6ff">VPC · 2+ Availability Zones</text>

  <!-- AZ A -->
  <rect x="64" y="320" width="284" height="150" rx="10" fill="none" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="80" y="340" class="grpt" fill="#8ce8df">Availability Zone A</text>
  <rect x="84" y="352" width="244" height="98" rx="9" fill="#ED7100"/>
  <text x="206" y="386" text-anchor="middle" class="tt">App (front + back)</text>
  <text x="206" y="404" text-anchor="middle" class="ts">ECS Fargate / EC2 ASG</text>
  <text x="206" y="420" text-anchor="middle" class="ts">contenedores</text>

  <!-- AZ B -->
  <rect x="360" y="320" width="284" height="150" rx="10" fill="none" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="376" y="340" class="grpt" fill="#8ce8df">Availability Zone B</text>
  <rect x="380" y="352" width="244" height="98" rx="9" fill="#ED7100"/>
  <text x="502" y="386" text-anchor="middle" class="tt">App (front + back)</text>
  <text x="502" y="404" text-anchor="middle" class="ts">ECS Fargate / EC2 ASG</text>
  <text x="502" y="420" text-anchor="middle" class="ts">contenedores</text>

  <!-- RDS -->
  <rect x="180" y="500" width="348" height="80" rx="9" fill="#2E73B8"/>
  <text x="354" y="530" text-anchor="middle" class="tt">Amazon RDS PostgreSQL</text>
  <text x="354" y="548" text-anchor="middle" class="ts">Multi-AZ: primary + standby</text>
  <text x="354" y="564" text-anchor="middle" class="ts">failover automático</text>

  <!-- S3 -->
  <rect x="688" y="296" width="200" height="76" rx="9" fill="#3FA037"/>
  <text x="788" y="324" text-anchor="middle" class="tt">Amazon S3</text>
  <text x="788" y="342" text-anchor="middle" class="ts">privado · SSE · versioning</text>
  <text x="788" y="358" text-anchor="middle" class="ts">(OAC vía CloudFront)</text>

  <!-- Secrets Manager -->
  <rect x="688" y="388" width="200" height="56" rx="9" fill="#DD344C"/>
  <text x="788" y="412" text-anchor="middle" class="tt">Secrets Manager</text>
  <text x="788" y="429" text-anchor="middle" class="ts">JWT/AES/CHAT · rotación</text>

  <!-- CloudWatch -->
  <rect x="688" y="460" width="200" height="56" rx="9" fill="#C2407A"/>
  <text x="788" y="484" text-anchor="middle" class="tt">CloudWatch</text>
  <text x="788" y="501" text-anchor="middle" class="ts">logs · métricas · alarmas</text>

  <!-- edges -->
  <path class="edge" d="M470,82 V104"/>
  <path class="edge" d="M470,152 V212"/>
  <rect x="478" y="172" width="70" height="17" rx="3" fill="#0f1622"/>
  <text x="513" y="185" text-anchor="middle" class="el">HTTPS</text>

  <path class="edged" d="M672,238 H640"/>
  <rect x="600" y="196" width="74" height="17" rx="3" fill="#0f1622"/>
  <text x="637" y="209" text-anchor="middle" class="el">cert ACM</text>

  <path class="edge" d="M410,264 V300 H206 V352"/>
  <path class="edge" d="M530,264 V300 H502 V352"/>
  <rect x="300" y="290" width="120" height="17" rx="3" fill="#0f1622"/>
  <text x="360" y="303" text-anchor="middle" class="el">reparte tráfico (2 AZ)</text>

  <path class="edge" d="M206,450 V500"/>
  <path class="edge" d="M502,450 V500"/>
  <rect x="300" y="476" width="108" height="17" rx="3" fill="#0f1622"/>
  <text x="354" y="489" text-anchor="middle" class="el">lectura / escritura</text>

  <!-- apps -> S3 -->
  <path class="edge" d="M624,392 H660 V334 H688"/>
  <rect x="556" y="368" width="116" height="17" rx="3" fill="#0f1622"/>
  <text x="614" y="381" text-anchor="middle" class="el">S3 SDK (IAM role)</text>

  <!-- apps -> Secrets (dashed) -->
  <path class="edged" d="M624,410 H656 V414 H688"/>
  <!-- apps -> CloudWatch (dashed) -->
  <path class="edged" d="M624,430 H672 V486 H688"/>
  <rect x="600" y="440" width="80" height="17" rx="3" fill="#0f1622"/>
  <text x="640" y="453" text-anchor="middle" class="el">logs/secretos</text>

  <!-- legend -->
  <g transform="translate(40,628)">
    <rect x="0" y="-10" width="14" height="14" rx="3" fill="#ED7100"/><text x="20" y="1" class="muted">Cómputo</text>
    <rect x="96" y="-10" width="14" height="14" rx="3" fill="#8C4FFF"/><text x="116" y="1" class="muted">Red / balanceo</text>
    <rect x="226" y="-10" width="14" height="14" rx="3" fill="#3FA037"/><text x="246" y="1" class="muted">Almacenamiento</text>
    <rect x="372" y="-10" width="14" height="14" rx="3" fill="#2E73B8"/><text x="392" y="1" class="muted">Base de datos</text>
    <rect x="492" y="-10" width="14" height="14" rx="3" fill="#DD344C"/><text x="512" y="1" class="muted">Seguridad</text>
    <rect x="588" y="-10" width="14" height="14" rx="3" fill="#C2407A"/><text x="608" y="1" class="muted">Gestionado</text>
  </g>
</svg>
